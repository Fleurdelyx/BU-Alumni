name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true

    - name: Create directories 
      run: |
        mkdir -p android/app
        ls -la android/app/

    - name: Verify Firebase config
      run: |
        if [ ! -f "android/app/google-services.json" ]; then
          echo "❌ google-services.json not found!"
          exit 1
        else
          echo "✅ google-services.json found"
        fi

    - name: Flutter doctor
      run: flutter doctor -v
    
    - name: Clean and get dependencies
      run: |
        flutter clean
        flutter pub get
        flutter pub deps

    - name: Build APK (Debug) with verbose output
      run: |
        echo "🔧 Building debug APK..."
        flutter build apk --debug --verbose
        
    - name: Build APK (Release) with verbose output  
      run: |
        echo "🔧 Building release APK..."
        flutter build apk --release --verbose

    - name: List APK files
      run: |
        echo "📦 Checking built APK files..."
        ls -la build/app/outputs/flutter-apk/
        file build/app/outputs/flutter-apk/*.apk
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: BU Alumni Tracer ${{ github.ref_name }}
        body: |
          ## 📱 Download APK Files
          
          **For Testing on Your Phone (Recommended):**
          - 📥 **Download `bu-alumni-tracer-debug.apk`**
          - Includes debugging information for easier troubleshooting
          
          **For Production Use:**
          - 📥 **Download `bu-alumni-tracer-release.apk`**
          - Optimized and smaller file size
          
          ## 📱 Installation Instructions
          1. **Enable Unknown Sources**: Go to Settings → Security → Enable "Install from Unknown Sources"
          2. **Download APK**: Click one of the APK files above  
          3. **Install**: Open the downloaded file and follow the installation prompts
          4. **Launch**: Find "BU Alumni Tracer" in your app drawer
          
          ## ✨ Features in this Release
          - 👥 Alumni directory and participant management
          - 🔐 Secure Firebase authentication  
          - 🎨 Dark/Light mode theme switching
          - 📊 Interactive questionnaires and surveys
          - 📈 Statistics and analytics dashboard
          - 🤖 AI-powered chatbot assistance (BUddy)
          - 📱 Offline capabilities with data sync
          
          ## 🐛 Found a Bug?
          Report issues at: https://github.com/Fleurdelyx/BU-Alumni/issues
        files: |
          build/app/outputs/flutter-apk/app-debug.apk
          build/app/outputs/flutter-apk/app-release.apk
        draft: false
        prerelease: false

  # Build on pull requests for testing
  test-build:
    name: Test Build (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Analyze code
      run: flutter analyze

    - name: Run tests
      run: flutter test

    - name: Build APK
      run: flutter build apk --debug