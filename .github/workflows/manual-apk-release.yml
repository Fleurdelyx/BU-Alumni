name: Manual APK Release Builder

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release version (e.g., v1.0.5)'
        required: true
        default: 'v1.0.5'

jobs:
  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter 3.41.2
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true

    - name: Verify environment
      run: |
        echo "🔍 Checking Flutter/Java versions..."
        flutter --version
        java -version
        flutter doctor --no-version-check
        echo "🔧 Setting up Android build environment..."
        # Accept Android licenses
        yes | flutter doctor --android-licenses 2>/dev/null || echo "Android licenses handled"
        # Check Android setup
        flutter config --android-sdk

    - name: Clean and get dependencies
      run: |
        echo "🧹 Cleaning previous builds..."
        flutter clean
        echo "📦 Installing dependencies..."
        flutter pub get
        echo "🔍 Checking dependency tree..."
        flutter pub deps --style=tree | head -15

    - name: Build debug APK (with fallbacks)
      run: |
        echo "🔨 Building debug APK with multiple fallback methods..."
        
        # Method 1: Standard debug build
        echo "🔨 Attempt 1: Standard debug build"
        if flutter build apk --debug --verbose; then
          echo "✅ Standard debug build succeeded"
        else
          echo "❌ Standard debug build failed, trying alternative approaches..."
          
          # Method 2: Clean and retry with no tree shaking
          echo "🔨 Attempt 2: Build with minimal optimizations"
          flutter clean
          flutter pub get
          if flutter build apk --debug --verbose --no-tree-shake-icons; then
            echo "✅ Minimal optimization build succeeded"
          else
            echo "❌ Minimal optimization failed, trying architecture-specific build..."
            
            # Method 3: Target specific architecture
            echo "🔨 Attempt 3: Architecture-specific build (ARM64)"
            flutter clean
            flutter pub get
            if flutter build apk --debug --verbose --target-platform=android-arm64; then
              echo "✅ ARM64-specific build succeeded"
            else
              echo "❌ Architecture-specific build failed, trying without verbose..."
              
              # Method 4: Simple build without verbose
              echo "🔨 Attempt 4: Simple debug build"
              flutter clean
              flutter pub get
              if flutter build apk --debug; then
                echo "✅ Simple debug build succeeded"
              else
                echo "❌ All debug build methods failed!"
                echo "🔍 Diagnostic information:"
                flutter doctor -v
                echo "🔍 Android SDK status:"
                flutter config --android-sdk
                echo "🔍 Gradle wrapper status:"
                chmod +x android/gradlew || echo "Gradlew not found"
                exit 1
              fi
            fi
          fi
        fi
        
        echo "📁 Checking for APK files after build..."
        find build/ -type f -name "*.apk" || echo "No APK files found after build"
        
    - name: Verify debug APK was created
      run: |
        echo "🔍 Verifying debug APK exists..."
        if [ ! -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
          echo "❌ Debug APK not found in expected location"
          echo "🔍 Searching for APK files in build directory..."
          find build/ -name "*.apk" -type f
          echo "📂 Build directory contents:"
          ls -la build/
          echo "📂 App directory contents:"
          ls -la build/app/ || echo "No app directory"
          echo "📂 Outputs directory contents:"
          ls -la build/app/outputs/ || echo "No outputs directory"
          exit 1
        else
          echo "✅ Debug APK found successfully"
          ls -la build/app/outputs/flutter-apk/app-debug.apk
        fi
        
    - name: Build release APK
      run: |
        echo "🚀 Building release APK..."
        flutter build apk --release --verbose
        
    - name: Verify release APK was created  
      run: |
        echo "🔍 Verifying release APK exists..."
        if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          echo "❌ Release APK not found in expected location"
          echo "🔍 Searching for APK files in build directory..."
          find build/ -name "*.apk" -type f
          exit 1
        else
          echo "✅ Release APK found successfully"
          ls -la build/app/outputs/flutter-apk/app-release.apk
        fi
        
    - name: Verify APK files for release
      id: check_apks
      run: |
        echo "📱 Final verification of APK files..."
        DEBUG_APK="build/app/outputs/flutter-apk/app-debug.apk"
        RELEASE_APK="build/app/outputs/flutter-apk/app-release.apk"
        
        echo "DEBUG_EXISTS=false" >> $GITHUB_OUTPUT
        echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
        
        if [ -f "$DEBUG_APK" ]; then
          echo "✅ Debug APK ready for release"
          ls -la "$DEBUG_APK"
          file "$DEBUG_APK"
          echo "DEBUG_EXISTS=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Debug APK missing"
        fi
        
        if [ -f "$RELEASE_APK" ]; then
          echo "✅ Release APK ready for release"
          ls -la "$RELEASE_APK"
          file "$RELEASE_APK"
          echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Release APK missing"
        fi
        
        echo "📊 APK file sizes:"
        du -h build/app/outputs/flutter-apk/*.apk 2>/dev/null || echo "No APK files to measure"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: steps.check_apks.outputs.DEBUG_EXISTS == 'true' || steps.check_apks.outputs.RELEASE_EXISTS == 'true'
      with:
        tag_name: ${{ github.event.inputs.release_name }}
        name: "BU Alumni Tracer ${{ github.event.inputs.release_name }}"
        body: |
          ## 📱 BU Alumni Tracer APK Downloads
          
          **👨‍🎓 For Testing (Recommended):**
          ${{ steps.check_apks.outputs.DEBUG_EXISTS == 'true' && '- 📥 **Download `app-debug.apk`**' || '- ❌ Debug APK build failed' }}
          
          **🏢 For Production Use:**
          ${{ steps.check_apks.outputs.RELEASE_EXISTS == 'true' && '- 📥 **Download `app-release.apk`**' || '- ❌ Release APK build failed' }}
          
          ## 📱 Installation Instructions
          
          1. **Enable Unknown Sources**: 
             - Settings → Security → Enable "Install from Unknown Sources"
          2. **Download**: Click one of the APK files above  
          3. **Install**: Open the downloaded file and tap "Install"
          4. **Launch**: Find "BU Alumni Tracer" in your app drawer
          
          ## ✨ Features Include:
          - 👥 Alumni directory management
          - 🔐 Secure Firebase authentication  
          - 🎨 Dark/Light theme switching
          - 📊 Interactive surveys and questionnaires
          - 📈 Statistics dashboard with charts
          - 🤖 AI chatbot assistant (BUddy)
          - 📱 Offline sync capabilities
          
          ## 🐛 Issues? 
          Report bugs: https://github.com/Fleurdelyx/BU-Alumni/issues
          
          ---
          *Built on: ${{ github.run_number }} • Commit: ${{ github.sha }}*
        files: |
          build/app/outputs/flutter-apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}