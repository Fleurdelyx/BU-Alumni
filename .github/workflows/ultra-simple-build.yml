name: Ultra Simple Debug Build

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ main ]  # Trigger on pushes too

jobs:
  minimal-build:
    name: Minimal Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true

    - name: Basic Flutter check
      run: |
        echo "🔍 Flutter environment check..."
        flutter --version
        flutter doctor --no-version-check

    - name: Get dependencies only
      run: |
        echo "📦 Installing dependencies..."
        flutter pub get

    - name: Analyze project (optional check)
      continue-on-error: true
      run: |
        echo "🔍 Quick code analysis..."
        flutter analyze --no-fatal-infos

    - name: Try the simplest possible APK build
      continue-on-error: true
      run: |
        echo "🔨 Attempting simplest APK build..."
        flutter build apk --debug
        
    - name: Check if build succeeded
      run: |
        echo "📱 Checking for APK output..."
        if [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
          echo "✅ APK build succeeded!"
          ls -la build/app/outputs/flutter-apk/
          file build/app/outputs/flutter-apk/app-debug.apk
        else
          echo "❌ APK build failed - no output file found"
          echo "📂 Available build outputs:"
          find build/ -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB files found"
          echo "📂 Build directory structure:"
          ls -la build/ || echo "Build directory doesn't exist"
        fi

    - name: Upload APK if successful
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk-minimal
        path: build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 7