name: bu_alumni_tracer
description: "A graduate tracer study app for Baliuag University."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # UI & Themes
  flutter_riverpod: ^2.4.0
  shared_preferences: ^2.2.0

  # Charts & Graphs
  fl_chart: ^0.65.0
  charts_flutter: ^0.12.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0

  # AI/ML - For Chatbot
  google_generative_ai: ^0.3.0

  # Image handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.17.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0

  # Icons & Assets
  cupertino_icons: ^1.0.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Fonts
  fonts:
    - family: GoudyOldStyle
      fonts:
        - asset: assets/fonts/GoudyOldStyle Roman.ttf

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
