name: bu_alumni_tracer
description: "A graduate tracer study app for Baliuag University."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Updated to latest stable versions
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2

  # State Management - Using flutter_riverpod (includes base riverpod)
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # UI & Themes
  shared_preferences: ^2.3.2

  # Charts & Graphs - Updated versions
  fl_chart: ^0.69.0
  # Remove charts_flutter as it's deprecated

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # AI/ML - For Chatbot
  google_generative_ai: ^0.4.6

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5

  # Icons & Assets
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Fonts
  fonts:
    - family: GoudyOldStyle
      fonts:
        - asset: assets/fonts/GoudyOldStyle Roman.ttf

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
